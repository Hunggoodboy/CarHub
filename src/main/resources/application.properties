spring.application.name=CarHub

# Database config
spring.datasource.url=jdbc:postgresql://localhost:5432/carhub
spring.datasource.username=postgres
spring.datasource.password=1506
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# PG vector
spring.ai.vectorstore.type=pgvector
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.dimensions=3072
spring.ai.vectorstore.pgvector.index-type=none
spring.ai.vectorstore.pgvector.distance-type=cosine_distance

# Cấu hình gọi Gemini thông qua OpenAI Client
# 🔴 SỬA Ở ĐÂY: dùng API key thật (thay bằng key của bạn)
spring.ai.openai.api-key=AIzaSyDyzeBLVx_0i_D85qhztOPwoYNBj0DX2Gc
spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai/

spring.ai.openai.chat.options.model=gemini-2.5-flash
spring.ai.openai.embedding.options.model=gemini-embedding-001

# Cho phép ghi đè Bean nếu cần
spring.main.allow-bean-definition-overriding=true