<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quên mật khẩu - CarHub</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="login-page">
    <div class="auth-card">
        <div class="auth-card__left">
            <a th:href="@{/login}" class="auth-card__tab active">ĐĂNG NHẬP</a>
            <a th:href="@{/register}" class="auth-card__tab">ĐĂNG KÍ</a>
        </div>

        <div class="auth-card__right">
            <div class="auth-card__header">
                <h3 class="auth-card__title">Quên mật khẩu</h3>
            </div>

            <div th:if="${error}" class="alert alert-danger" style="color: red; text-align: center; margin-bottom: 10px;"
                 th:text="${error}"></div>

            <form th:action="@{/forgot-password}" method="post" class="auth-card__form">
                <div class="auth-card__group">
                    <input type="email" name="email" class="auth-card__input" placeholder="Nhập email đã đăng ký" required>
                </div>

                <div class="auth-card__group">
                    <input type="password" name="newPassword" class="auth-card__input" placeholder="Mật khẩu mới" required>
                </div>

                <div class="auth-card__actions">
                    <a th:href="@{/login}" class="auth-card__forgot">Quay lại đăng nhập</a>
                    <button type="submit" class="btn btn--gradient">ĐỔI MẬT KHẨU</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
