<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tin nhắn</title>
    <link rel="stylesheet" th:href="@{/css/chat.css}" href="/css/chat.css">
</head>
<body>
<div class="chat-container">
    <aside class="chat-sidebar">
        <div class="sidebar-header">
            <div class="header-left">
                <a th:href="@{/index}" class="btn-back">✕</a>
                <h2>Đoạn chat</h2>
            </div>
        </div>
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="chat-search" placeholder="Tìm kiếm...">
        </div>
        <ul id="recent-chats-list" class="recent-chats"></ul>
    </aside>

    <main class="chat-window">
        <header class="chat-header" id="chat-header" style="display: none;">
            <div class="chat-partner-info">
                <div class="avatar" id="partner-avatar">?</div>
                <div>
                    <h3 id="partner-name">Tên người dùng</h3>
                    <span id="connection-status" class="status connected">🟢 Đã kết nối</span>
                </div>
                
            </div>
        </header>

        <div class="chat-messages" id="chat-messages">
            <div class="empty-chat-state" id="empty-state">
                <div class="carhub-logo-container">
                   <span class="carhub-logo-text">Car<span class="hub-highlight">Hub</span></span>
                   <div class="carhub-logo-underline"></div> 
                </div>

                <div class="welcome-text-container">
                    <h3>Chào mừng đến với CarHub Chat!</h3>
                    <p>Hãy chọn một đoạn chat để bắt đầu</p>
                </div>
            </div>
        </div>

        <footer class="chat-input-area" id="chat-input-area" style="display: none;">
            <textarea id="chat-input" placeholder="Nhập tin nhắn..." rows="1"></textarea>
            <button id="btn-like">👍</button>
            <button id="btn-send">Gửi</button>
        </footer>
    </main>
</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <script th:src="@{/js/chat-app.js}" src="/js/chat-app.js"></script>
</body>
</html>
